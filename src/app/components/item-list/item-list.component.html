<div style="margin: 20px">

  <button mat-flat-button color="primary" routerLink="/create">
    Add Item
  </button>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width:100%; margin-top:20px">

    <!-- cat Code-->
    <ng-container matColumnDef="catCode">
      <th mat-header-cell *matHeaderCellDef> Cat Code </th>
      <td mat-cell *matCellDef="let item"> {{item.catCode}} </td>  
    </ng-container>

    <!-- item Bar Code-->
    <ng-container matColumnDef="itemBarCode">
      <th mat-header-cell *matHeaderCellDef> Item Bar Code </th>
      <td mat-cell *matCellDef="let item"> {{item.itemBarCode}} </td>  
    </ng-container>

    <!-- Item Code -->
    <ng-container matColumnDef="itemCode">
      <th mat-header-cell *matHeaderCellDef> Code </th>
      <td mat-cell *matCellDef="let item"> {{item.itemCode}} </td>
    </ng-container>

    <!-- Item Name -->
    <ng-container matColumnDef="itemName">
      <th mat-header-cell *matHeaderCellDef> Item Name </th>
      <td mat-cell *matCellDef="let item"> {{item.itemName}} </td>
    </ng-container>

    <!-- Description -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Description </th>
      <td mat-cell *matCellDef="let item"> {{item.description}} </td>
    </ng-container>

    <!-- UOM -->
    <ng-container matColumnDef="uom">
      <th mat-header-cell *matHeaderCellDef> UOM </th>
      <td mat-cell *matCellDef="let item"> {{item.uom}} </td>
    </ng-container>

    <!-- Rate -->
    <ng-container matColumnDef="rate">
      <th mat-header-cell *matHeaderCellDef> Rate </th>
      <td mat-cell *matCellDef="let item"> {{item.rate}} </td>
    </ng-container>

    <!-- Minimum Stock -->
    <ng-container matColumnDef="minimumStock">
      <th mat-header-cell *matHeaderCellDef> Minimum Stock </th>
      <td mat-cell *matCellDef="let item"> {{item.minimumStock}} </td>
    </ng-container>

    <!-- Maximum Stock -->
    <ng-container matColumnDef="maximumStock">
      <th mat-header-cell *matHeaderCellDef> Maximum Stock </th>
      <td mat-cell *matCellDef="let item"> {{item.maximumStock}} </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let item"> {{item.isActive}} </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let item">

        <button mat-flat-button color="primary" [routerLink]="['/edit', item.id]">
          Edit
        </button>

        <button mat-flat-button color="warn" (click)="delete(item.id, item.itemName)">
          Delete
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
